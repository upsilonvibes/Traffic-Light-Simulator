<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Light Simulator</title>
    <link rel="stylesheet" href="styles.css">


</head>

<body>
    <header>
        <h1 class="header">Traffic Light Simulator</h1>


    </header>
    <main>
        <div class="controls">
            <button id="cross-btn">Request Crossing</button>
            <div id="ped-signal" class="walk-signal">WAIT</div>
        </div>
        <div class="traffic-light">
            <div class="light light-red" id="red">STOP</div>
            <div class="light light-yellow" id="yellow">WAIT</div>
            <div class="light light-green" id="green">GO</div>
        </div>
    </main>
    <footer>
        <p>&copy; April 2026 Traffic Light Simulator. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
